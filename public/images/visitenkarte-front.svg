<svg width="85mm" height="55mm" viewBox="0 0 850 550" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="850" y2="550">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="60%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#162035"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d47a00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="550" fill="url(#bg)"/>
  <rect width="850" height="550" fill="url(#glow)"/>

  <!-- Thin amber accent along top -->
  <rect x="0" y="0" width="850" height="3.5" fill="#f59e0b" opacity="0.8"/>

  <!-- Logo badge — centered -->
  <rect x="375" y="130" width="100" height="100" rx="24" fill="url(#badge)"/>
  <!-- N centered: badge center is (425, 180), dy="0.36em" for vertical centering -->
  <text x="425" y="180" dy="0.36em" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="900" fill="#0a0f1e" text-anchor="middle">N</text>

  <!-- Brand name -->
  <text x="425" y="292" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">Nurbanum</text>

  <!-- Amber accent line -->
  <rect x="388" y="312" width="74" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="425" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#8ba4c8" text-anchor="middle" letter-spacing="4.5">VERSICHERUNGSMAKLER</text>

  <!-- Tagline -->
  <text x="425" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#5a7aaa" text-anchor="middle" font-style="italic" letter-spacing="0.5">Ihr Experte für Altersvorsorge &amp; Ruhestandsplanung</text>
</svg>
